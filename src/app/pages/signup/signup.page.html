<ion-content [fullscreen]="true" class="signup-content">

  <div class="glow glow--top-left"></div>

  <div class="auth-hero">
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="22" height="28" rx="4" fill="rgba(255,255,255,0.92)"/>
        <circle cx="29" cy="29" r="9" fill="#1D9E75"/>
        <path d="M25 29l2.8 2.8 5.2-5.6" stroke="#fff" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="auth-app-name">DigiPermit</h2>
    <p class="auth-app-sub">Create your account</p>
  </div>

  <div class="auth-sheet">
    <h1 class="sheet-heading">Get started</h1>
    <p class="sheet-desc">Register as a verification officer</p>

    <div class="field">
      <label class="field-label">Full name</label>
      <ion-input
        class="glass-input"
        type="text"
        placeholder="Sibongile Mthembu"
        [(ngModel)]="fullName"
        autocomplete="name">
      </ion-input>
    </div>

    <div class="field">
      <label class="field-label">Work email</label>
      <ion-input
        class="glass-input"
        type="email"
        placeholder="s.mthembu@institution.co.za"
        [(ngModel)]="email"
        autocomplete="email">
      </ion-input>
    </div>

    <div class="field">
      <label class="field-label">Password</label>
      <ion-input
        class="glass-input"
        type="password"
        placeholder="Min. 8 characters"
        [(ngModel)]="password">
      </ion-input>
    </div>

    <p class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</p>

    <div class="success-msg" *ngIf="successMsg">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      {{ successMsg }}
    </div>

    <ion-button
      class="g-btn"
      expand="block"
      (click)="signup()"
      [disabled]="loading">
      <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
      {{ loading ? 'Creating account...' : 'Create account' }}
    </ion-button>

    <p class="auth-link">
      Already registered?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>

</ion-content>
