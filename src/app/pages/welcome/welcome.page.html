<ion-content [fullscreen]="true" class="welcome-content">

  <!-- Radial glow blobs -->
  <div class="glow glow--top"></div>
  <div class="glow glow--bottom"></div>

  <div class="splash-body">

    <!-- Logo -->
    <div class="logo-ring">
      <svg width="44" height="44" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="22" height="28" rx="4" fill="rgba(255,255,255,0.92)"/>
        <rect x="9" y="11" width="10" height="2" rx="1" fill="#0A3D26"/>
        <rect x="9" y="15" width="14" height="2" rx="1" fill="#0A3D26"/>
        <rect x="9" y="19" width="11" height="2" rx="1" fill="#0A3D26"/>
        <circle cx="29" cy="29" r="9" fill="#1D9E75"/>
        <path d="M25 29l2.8 2.8 5.2-5.6" stroke="#fff" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- App name -->
    <h1 class="splash-title">DigiPermit</h1>
    <p class="splash-sub">Immigration verification<br>you can trust</p>

    <!-- Animated loader bar -->
    <div class="loader-track">
      <div class="loader-fill"></div>
    </div>

    <span class="splash-ver">v1.0 &middot; South Africa</span>

  </div>

</ion-content>
